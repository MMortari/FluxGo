syntax = "proto3";

package user;

option go_package = "github.com/MMortari/FluxGo/example/full/shared/pb/user;userpb";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
  string id_user = 1;
}

message GetUserResponse {
  User user = 1;
}

message User {
  string id = 1;
  string name = 2;
}
